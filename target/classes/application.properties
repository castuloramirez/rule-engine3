# ============================================================
# Gmail Rule Engine — Application Properties
# ============================================================

server.port=${PORT:8080}
spring.application.name=gmail-rule-engine

# ============================================================
# H2 File-Based Database (PERSISTENT — survives restarts)
# Data saved to: ./data/ruleenginedb.mv.db  (next to your JAR)
# View at:  http://localhost:8080/h2-console
#   JDBC URL: jdbc:h2:file:./data/ruleenginedb
#   User:     sa
#   Password: (leave blank)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/ruleenginedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# AI Provider Configuration
#
# Options:
#   keyword      — no setup needed, keyword matching (DEFAULT)
#   ollama       — local LLM (install https://ollama.ai, run: ollama run llama3)
#   huggingface  — free API (get token at https://huggingface.co/settings/tokens)
# ============================================================
ai.provider=keyword

# Ollama settings (only used when ai.provider=ollama)
ai.ollama.url=http://localhost:11434
ai.ollama.model=llama3

# HuggingFace settings (only used when ai.provider=huggingface)
# Replace with your free HuggingFace token
ai.huggingface.token=hf_YOUR_TOKEN_HERE
ai.huggingface.model=facebook/bart-large-mnli

# ============================================================
# Logging
# ============================================================
# Import legacy rules YAML
spring.config.import=classpath:rules-legacy.yml

logging.level.com.ruleengine=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
